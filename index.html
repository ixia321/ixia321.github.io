<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ixia's page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            background: 
            url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%238B5A2B' fill-opacity='0.5'%3E%3Ccircle cx='30' cy='30' r='5'/%3E%3C/g%3E%3C/svg%3E"),
            linear-gradient(135deg, #FFF0F5 0%, #FFE4E9 100%);
            background-size: auto, 100% 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }   

        .container {
            background-color: white;
            max-width: 600px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(139, 90, 43, 0.15);
            padding: 60px 40px;
            overflow: hidden;
            border: 2px solid #8B5A2B;
            text-align: center;
        }
        
        h1 {
            color: #8B5A2B;
            font-size: 3.5rem;
            margin-bottom: 30px;
            font-weight: 400;
            font-family: 'Abril Fatface';
            text-shadow: 2px 2px 4px rgba(139, 90, 43, 0.2);
        }
        
        .coming-soon {
            color: #FFB5C5;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .heart {
            color: #8B5A2B;
            font-size: 2.5rem;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .logo {
            font-weight: 700;
            color: #8B5A2B;
            letter-spacing: 1px;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .coming-soon {
                font-size: 1.5rem;
            }
            
            .container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><3<3<3</div>
        <h1>ixia's page</h1>
        <div class="coming-soon">coming soon<span class="heart">...</span></div>
    </div>
</body>
</html>
